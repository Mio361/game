<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>数字あてゲーム</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align: center;
    background-color: #f4f4f4;
    margin-top: 100px;
}

.box{
    background: white;
    width: 350px;
    margin: auto;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 5px 10px rgba(0,0,0,0.2);
}

input{
    padding: 5px;
    font-size: 16px;
}

button{
    padding: 6px 15px;
    font-size: 16px;
    margin-left: 5px;
}
</style>

</head>

<body>

<div class="box">
<h1>数字あてゲーム</h1>

<p>1〜10の数字を当ててください</p>

<input type="number" id="guess">
<button onclick="checkNumber()">決定</button>

<p id="result"></p>

</div>

<script>

let answer = Math.floor(Math.random()*10)+1;

function checkNumber(){

let guess = document.getElementById("guess").value;

if(guess == answer){
document.getElementById("result").textContent = "正解！";
}else if(guess < answer){
document.getElementById("result").textContent = "もっと大きいです";
}else{
document.getElementById("result").textContent = "もっと小さいです";
}

}

</script>

</body>
</html>
